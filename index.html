<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wabi Sabi | Confeitaria Artesanal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Wabi Sabi Logo - Bolo minimalista" class="logo-img">
            <h1>Wabi Sabi</h1>
        </div>
        <p class="subtitle">Confeitaria com simplicidade e afeto</p>
    </header>

    <main class="main-content">
        <section class="order-section">
            <h2>Faça sua Encomenda</h2>
            <p class="section-desc">Preencha os dados abaixo e você será direcionado para confirmar seu pedido.</p>
            
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSe7GXsaweggBE3Zi23youI1hy2IhWnJU8O-prDOas12w9z5Nw/formResponse" method="POST" target="hidden_iframe" id="orderForm" class="order-form">
                <div class="form-group">
                    <label for="nome">Nome do cliente *</label>
                    <input type="text" id="nome" name="entry.2031570011" required placeholder="Ex: Maria Silva">
                </div>

                <div class="form-group">
                    <label for="produto">Informe o produto desejado *</label>
                    <select id="produto" name="entry.626025703" required>
                        <option value="" disabled selected>Selecione uma opção</option>
                        <option value="Bolo de festa">Bolo de festa</option>
                        <option value="Bolo caseiro">Bolo caseiro</option>
                        <option value="Cookies">Cookies</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="quantidade">Quantidade *</label>
                    <small>Em caso de bolo quantas pessoas; em caso de cookies informar unidades.</small>
                    <input type="text" id="quantidade" name="entry.764942230" required placeholder="Ex: Bolo para 10 pessoas ou 20 cookies">
                </div>

                <div class="form-group">
                    <label for="whatsapp">Informe o número do whatsapp *</label>
                    <input type="tel" id="whatsapp" name="entry.732569786" required placeholder="(19) 99999-9999">
                </div>

                <div class="form-group">
                    <label for="endereco">Informe seu endereço *</label>
                    <textarea id="endereco" name="entry.2061784476" rows="3" required placeholder="Rua, número, bairro, complemento"></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    Continuar Encomenda <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </section>
    </main>

    <a href="https://wa.me/551999999999" target="_blank" rel="noopener noreferrer" class="floating-whatsapp" aria-label="Fale conosco no WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="app.js"></script>
</body>
</html>
